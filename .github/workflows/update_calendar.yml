name: Aggiorna calendario Junker

on:
  schedule:
    - cron: '0 6 1,2,5,8 1 *'
    - cron: '0 6 1 4 *'
    - cron: '0 6 1 6 *'
    - cron: '0 6 1 10 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - run: |
        python -m pip install --upgrade pip
        pip install requests ics

    - run: python generate_calendar.py

    - run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add calendario.ics
        git diff --cached --quiet || git commit -m "Aggiornamento calendario"
        git push --force
